<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">

<title>Register</title>
</head>

<body>

<div class="container vh-100 d-flex justify-content-center align-items-center">

<div class="card shadow p-4" style="width:420px">

<h3 class="text-center mb-4">Register</h3>

<form class="needs-validation" novalidate action="index.html">

<div class="mb-3">
<label class="form-label">Full Name</label>
<input type="text"
class="form-control"
placeholder="Enter your name"
required>

<div class="invalid-feedback">
Please enter your name
</div>
</div>

<div class="mb-3">
<label class="form-label">Phone Number</label>
<input type="tel"
class="form-control"
placeholder="Enter your phone number"
required>

<div class="invalid-feedback">
Please enter phone number
</div>
</div>

<div class="mb-3">
<label class="form-label">Email</label>
<input type="email"
class="form-control"
placeholder="Enter your email"
required>

<div class="invalid-feedback">
Please enter a valid email
</div>
</div>

<div class="mb-3 position-relative">

<label class="form-label">Password</label>

<input type="password"
class="form-control"
id="password"
placeholder="Create password"
required>

<i class="bi bi-eye-slash position-absolute top-50 end-0 translate-middle-y me-3"
id="togglePassword"
style="cursor:pointer"></i>

<div id="strengthMessage" class="mt-2"></div>

</div>

<div class="mb-3">
<label class="form-label">Confirm Password</label>
<input type="password"
class="form-control"
placeholder="Re-enter password"
required>
</div>

<button type="submit" class="btn btn-success w-100">
Register
</button>

<div class="text-center mt-3">
<a href="index.html">Already have an account? Login</a>
</div>

</form>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>



const togglePassword = document.getElementById("togglePassword");
const password = document.getElementById("password");

togglePassword.addEventListener("click", function(){

const type = password.getAttribute("type") === "password" ? "text" : "password";

password.setAttribute("type", type);

this.classList.toggle("bi-eye");

});



const strength = document.getElementById("strengthMessage");

password.addEventListener("keyup", function(){

let value = password.value;

if(value.length < 4){
strength.innerHTML = "Weak Password";
strength.style.color = "red";
}
else if(value.length < 8){
strength.innerHTML = "Medium Password";
strength.style.color = "orange";
}
else{
strength.innerHTML = "Strong Password";
strength.style.color = "green";
}

});



(() => {

'use strict'

const forms = document.querySelectorAll('.needs-validation')

Array.from(forms).forEach(form => {

form.addEventListener('submit', event => {

if (!form.checkValidity()) {

event.preventDefault()
event.stopPropagation()

}

form.classList.add('was-validated')

}, false)

})

})()

</script>

</body>
</html>
